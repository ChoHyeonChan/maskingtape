[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "maskingtape-mcp"
version = "0.1.0"
description = "maskingtape MCP 서버 — AI 에이전트용 한국어 개인정보 비식별화 도구"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "Team maskingtape" }]
dependencies = [
  "mcp>=1.10,<2",
  "maskingtape",
]

[project.scripts]
maskingtape-mcp = "maskingtape_mcp.server:main"

[tool.setuptools.packages.find]
include = ["maskingtape_mcp*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
