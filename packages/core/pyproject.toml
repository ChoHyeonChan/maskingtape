[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "maskingtape"
version = "0.1.0"
description = "한국어 개인정보 비식별화 엔진 — 규칙 + 로컬 LLM 하이브리드 PII 탐지·마스킹"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "Team maskingtape" }]
keywords = ["korean", "pii", "privacy", "anonymization", "deidentification", "masking"]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Topic :: Security",
]

[project.optional-dependencies]
# ruff 0.16에서 새 규칙(TRY004 등)이 stable로 승격돼 기존 코드 린트를 깬다.
# CI와 로컬이 같은 규칙을 쓰도록 상한을 둔다 — 0.16 규칙 정리는 별도 이슈(#60).
dev = ["pytest>=8", "ruff>=0.4,<0.16"]

[project.scripts]
maskingtape = "maskingtape.cli:main"

[tool.setuptools.packages.find]
include = ["maskingtape*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
