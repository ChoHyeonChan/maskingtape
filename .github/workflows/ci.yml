name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core package
        run: pip install -e "packages/core[dev]"
      - name: Lint
        run: ruff check packages/core
      - name: Test
        run: pytest packages/core -q
