name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packages (core 먼저 — mcp-server가 로컬 core에 의존)
        run: |
          pip install -e "packages/core[dev]"
          pip install -e packages/mcp-server
      - name: Lint
        run: ruff check packages/core packages/mcp-server bench
      - name: Test core
        run: pytest packages/core -q
      - name: Test mcp-server
        run: pytest packages/mcp-server -q
      - name: Test bench
        run: pytest bench -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - name: Install packages
        run: npm ci
      - name: Test
        run: npm test
      - name: Build (타입 체크 포함)
        run: npm run build
